<!-- Image Viewer Window -->
<div id="imageviewer-window" class="desktop-window minimized">

      <span class="title-btn iv-btn-min" title="Minimize">&#x2013;</span>
      <span class="title-btn iv-btn-max" title="Maximize">&#x25FB;</span>
      <span class="title-btn iv-btn-close" title="Close">&#x2715;</span>
    </div>
  </div>
  <div id="imageviewer-toolbar">
    <button class="iv-tool-btn" data-action="prev" title="Previous">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <button class="iv-tool-btn" data-action="next" title="Next">

    </button>
    <span class="iv-toolbar-sep"></span>

    <span class="iv-toolbar-sep"></span>
    <button class="iv-tool-btn" data-action="rotate-left" title="Rotate Left">

  <div id="imageviewer-strip"></div>
