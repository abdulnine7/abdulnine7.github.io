<!-- Browser (Firefox) Window -->
<div id="browser-window" class="desktop-window minimized">
  <div id="browser-header">
    <div id="browser-tabs">
      <div class="browser-tab active">
        <span id="browser-tab-label">New Tab</span>
        <span class="browser-tab-close">&#x2715;</span>
      </div>
      <div class="title-buttons">
        <span class="title-btn browser-btn-min" title="Minimize">&#x2013;</span>
        <span class="title-btn browser-btn-max" title="Maximize">&#x25FB;</span>
        <span class="title-btn browser-btn-close btn-close" title="Close">&#x2715;</span>
      </div>
    </div>
    <div id="browser-urlbar">
      <div class="browser-nav-btn" id="browser-btn-back" title="Back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="browser-nav-btn" id="browser-btn-forward" title="Forward">
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </div>
      <div class="browser-nav-btn" id="browser-btn-refresh" title="Refresh">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </div>
      <input id="browser-url-input" type="text" placeholder="Search or enter address" spellcheck="false" autocomplete="off">
    </div>
  </div>
  <div id="browser-bookmarks"></div>
  <div id="browser-content">
    <div id="browser-landing"></div>
    <iframe id="browser-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div id="browser-error">
      <div class="browser-error-icon">&#x1F512;</div>
      <div class="browser-error-title">This site can't be displayed in a frame</div>
      <div class="browser-error-msg">The website has restricted embedding for security reasons. You can open it directly in a new browser tab instead.</div>
      <span class="browser-error-link" data-url="">Open in new tab</span>
    </div>
  </div>
  <div id="browser-resize-handle"></div>
</div>
