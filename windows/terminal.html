<header class="window-header">
  <div class="window-title">Terminal</div>
  <div class="window-controls" aria-label="Window controls">
    <button class="win-btn minimize" aria-label="Minimize">&ndash;</button>
    <button class="win-btn maximize" aria-label="Maximize">&square;</button>
    <button class="win-btn close" aria-label="Close">&times;</button>
  </div>
</header>
<div class="resize-handle" aria-hidden="true"></div>
<div id="terminal" role="region" aria-live="polite" aria-label="Terminal output">
  <div id="term-output"></div>
  <div id="term-input-line">
    <span id="term-prompt"></span>
    <div id="term-input-container">
      <input id="term-input" type="text" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Terminal input">
      <div id="term-cursor-overlay"><span id="term-cursor-text"></span><span id="term-cursor"></span></div>
    </div>
  </div>
</div>
