<!-- Calendar Window -->
<div id="calendar-window" class="desktop-window minimized">
  <div id="calendar-header">
    <div class="calendar-nav">
      <button id="cal-prev" class="cal-nav-btn" title="Previous Month">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <span id="cal-month-year"></span>
      <button id="cal-next" class="cal-nav-btn" title="Next Month">
        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <button id="cal-today-btn" class="cal-today-btn">Today</button>
    </div>
    <div class="title-buttons">
      <span class="title-btn cal-btn-min" title="Minimize">&#x2013;</span>
      <span class="title-btn cal-btn-max" title="Maximize">&#x25FB;</span>
      <span class="title-btn cal-btn-close" title="Close">&#x2715;</span>
    </div>
  </div>
  <div id="cal-grid"></div>
  <div id="cal-events"></div>
  <div id="calendar-resize-handle"></div>
</div>
