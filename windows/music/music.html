<!-- Music Player Window -->
<div id="music-window" class="desktop-window minimized">
  <div id="music-header">
    <div id="music-title">Music</div>
    <div class="title-buttons">
      <span class="title-btn music-btn-min" title="Minimize">&#x2013;</span>
      <span class="title-btn music-btn-max" title="Maximize">&#x25FB;</span>
      <span class="title-btn music-btn-close" title="Close">&#x2715;</span>
    </div>
  </div>
  <div id="music-now-playing"></div>
  <div id="music-controls"></div>
  <div id="music-playlist"></div>
  <div id="music-resize-handle"></div>
</div>
