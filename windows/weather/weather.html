<!-- Weather Window -->
<div id="weather-window" class="desktop-window minimized">
  <div id="weather-header">
    <div id="weather-title">Weather</div>
    <div class="title-buttons">
      <span class="title-btn weather-btn-min" title="Minimize">&#x2013;</span>
      <span class="title-btn weather-btn-max" title="Maximize">&#x25FB;</span>
      <span class="title-btn weather-btn-close" title="Close">&#x2715;</span>
    </div>
  </div>
  <div id="weather-city-bar"></div>
  <div id="weather-main"></div>
  <div id="weather-details"></div>
  <div id="weather-resize-handle"></div>
</div>
