<!-- Notepad / Text Editor Window -->
<div id="notepad-window" class="desktop-window minimized">
  <div id="notepad-header">
    <div id="notepad-title">Untitled &mdash; Text Editor</div>
    <div class="title-buttons">
      <span class="title-btn notepad-btn-min" title="Minimize">&#x2013;</span>
      <span class="title-btn notepad-btn-max" title="Maximize">&#x25FB;</span>
      <span class="title-btn notepad-btn-close btn-close" title="Close">&#x2715;</span>
    </div>
  </div>
  <div id="notepad-toolbar">
    <div class="notepad-tool-btn" data-action="new" title="New (Ctrl+N)">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3v2zm-3-7V3.5L18.5 9H13z"/></svg>
      <span>New</span>
    </div>
    <div class="notepad-tool-btn" data-action="open" title="Open (Ctrl+O)">
      <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
      <span>Open</span>
    </div>
    <div class="notepad-tool-btn" data-action="save" title="Save (Ctrl+S)">
      <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
      <span>Save</span>
    </div>
    <div class="notepad-tool-sep"></div>
    <div class="notepad-tool-btn" data-action="save-as" title="Save As (Ctrl+Shift+S)">
      <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
      <span>Save As</span>
    </div>
  </div>
  <div id="notepad-file-list"></div>
  <div id="notepad-editor">
    <div id="notepad-lines">1</div>
    <textarea id="notepad-textarea" placeholder="Start typing or open a file..." spellcheck="false"></textarea>
  </div>
  <div id="notepad-statusbar">
    <div class="notepad-status-left"><span>Ln 1, Col 1</span><span>0 characters</span></div>
    <div class="notepad-status-right"><span>1 lines</span><span>UTF-8</span></div>
  </div>
  <div id="notepad-dialog-overlay"></div>
  <div id="notepad-save-dialog">
    <div class="notepad-dialog-title">Save As</div>
    <input id="notepad-save-input" type="text" placeholder="/home/user/filename.txt" spellcheck="false">
    <div class="notepad-dialog-btns">
      <div class="notepad-dialog-btn" id="notepad-save-cancel">Cancel</div>
      <div class="notepad-dialog-btn primary" id="notepad-save-confirm">Save</div>
    </div>
  </div>
  <div id="notepad-resize-handle"></div>
</div>
