<!-- Calculator Window -->
<div id="calculator-window" class="desktop-window minimized">
  <div id="calculator-header">
    <div id="calculator-title">Calculator</div>
    <div class="title-buttons">
      <span class="title-btn calc-btn-min" title="Minimize">&#x2013;</span>
      <span class="title-btn calc-btn-max" title="Maximize">&#x25FB;</span>
      <span class="title-btn calc-btn-close" title="Close">&#x2715;</span>
    </div>
  </div>
  <div id="calc-display">
    <div id="calc-expression"></div>
    <div id="calc-result">0</div>
  </div>
  <div id="calc-buttons"></div>
  <div id="calculator-resize-handle"></div>
</div>
