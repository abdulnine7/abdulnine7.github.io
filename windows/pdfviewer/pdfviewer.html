<!-- PDF Viewer Window -->
<div id="pdf-window" class="desktop-window minimized">
  <div id="pdf-header">
    <div class="pdf-filename">Document.pdf</div>
    <div class="title-buttons">
      <span class="title-btn pdf-btn-min" title="Minimize">&#x2013;</span>
      <span class="title-btn pdf-btn-max" title="Maximize">&#x25FB;</span>
      <span class="title-btn pdf-btn-close" title="Close">&#x2715;</span>
    </div>
  </div>
  <div id="pdf-toolbar">
    <button class="pdf-tool-btn" data-action="zoom-out" title="Zoom Out">
      <svg viewBox="0 0 24 24"><path d="M6 8h6v2H6z"/></svg>
    </button>
    <button class="pdf-tool-btn" data-action="zoom-reset" title="Reset">100%</button>
    <button class="pdf-tool-btn" data-action="zoom-in" title="Zoom In">
      <svg viewBox="0 0 24 24"><path d="M12 10h-2v2H8v-2H6V8h2V6h2v2h2v2z"/></svg>
    </button>
    <a class="pdf-open-external" title="Open in new tab">
      <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
    </a>
  </div>
  <div id="pdf-content">
    <embed id="pdf-embed" type="application/pdf" width="100%" height="100%">
    <div id="pdf-fallback" style="display:none;">
      <div class="pdf-fallback-icon">
        <svg viewBox="0 0 24 24" fill="#D32F2F" width="64" height="64"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 9h-2v2H9v-2H7v-2h2V7h2v2h2v2zm3-3.5V9h-5V3.5L16 7.5z"/></svg>
      </div>
      <div class="pdf-fallback-text">PDF cannot be displayed inline</div>
      <button class="pdf-fallback-open">Open in new tab</button>
    </div>
  </div>
  <div id="pdf-resize-handle"></div>
</div>
