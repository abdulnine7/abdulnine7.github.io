<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>user@ubuntu-server: ~</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="terminal-wrapper">
  <div id="title-bar">
    <div class="title-buttons">
      <span class="title-btn btn-close"></span>
      <span class="title-btn btn-min"></span>
      <span class="title-btn btn-max"></span>
    </div>
    <div id="title-text">user@ubuntu-server: ~</div>
  </div>
  <div id="terminal" tabindex="0">
    <div id="output"></div>
    <div id="input-line">
      <span id="prompt"></span>
      <div id="input-container">
        <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div id="cursor-overlay"><span id="cursor-text"></span><span id="fake-cursor"></span></div>
      </div>
    </div>
  </div>
</div>
<div id="nano-editor">
  <div id="nano-header">GNU nano 6.2</div>
  <textarea id="nano-content"></textarea>
  <div id="nano-footer"><span>^X Exit</span><span>^S Save</span><span>^K Cut</span></div>
</div>
<div id="vim-editor">
  <div id="vim-content" contenteditable="true"></div>
  <div id="vim-status">-- NORMAL --</div>
  <div id="vim-command"></div>
</div>

<script src="script.js"></script>
</body>
</html>
