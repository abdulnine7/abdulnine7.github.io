<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shellfolio</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/desktop.css">
<link rel="stylesheet" href="css/terminal.css">
<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/files.css">
<link rel="stylesheet" href="css/notepad.css">
<link rel="stylesheet" href="css/browser.css">
<link rel="stylesheet" href="css/monitor.css">
<link rel="stylesheet" href="css/calculator.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/weather.css">
<link rel="stylesheet" href="css/music.css">
<link rel="stylesheet" href="css/snake.css">
<link rel="stylesheet" href="css/imageviewer.css">
<link rel="stylesheet" href="css/pdfviewer.css">
<link rel="stylesheet" href="css/photobooth.css">
<link rel="stylesheet" href="css/settings.css">
<link rel="stylesheet" href="css/activities.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="ubuntu-desktop">

  <!-- GNOME Top Panel -->
  <div id="top-panel">
    <div id="activities-btn">Activities</div>
    <div id="panel-clock"></div>
    <div id="system-tray">
      <svg class="tray-icon" viewBox="0 0 24 24" fill="currentColor" title="Wi-Fi"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg class="tray-icon" viewBox="0 0 24 24" fill="currentColor" title="Volume"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <svg class="tray-icon" viewBox="0 0 24 24" fill="currentColor" title="Battery"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      <span id="tray-power-icon" title="Power">
        <svg class="tray-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
      </span>
    </div>
  </div>

  <!-- Left Dock -->
  <div id="dock">
    <div class="dock-icon" data-app="files" data-pinned title="Files">
      <svg viewBox="0 0 24 24" fill="#5B9BD5"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
    </div>
    <div class="dock-icon active" data-app="terminal" data-pinned title="Terminal">
      <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="18" rx="2" fill="#300A24"/><path d="M6 8l4 4-4 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="16" x2="18" y2="16" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <div class="dock-icon" data-app="profile" data-pinned title="Profile">
      <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--accent-color)"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
    <div class="dock-icon" data-app="music" data-pinned title="Music">
      <svg viewBox="0 0 24 24" fill="#9C27B0"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>
    <div class="dock-icon" data-app="settings" title="Settings">
      <svg viewBox="0 0 24 24" fill="#999"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </div>
    <div class="dock-icon" data-app="firefox" title="Firefox">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF6611"/><circle cx="12" cy="12" r="6" fill="#FFBD4F"/><circle cx="12" cy="12" r="3" fill="#FF6611"/></svg>
    </div>
    <div class="dock-icon" data-app="text-editor" title="Text Editor">
      <svg viewBox="0 0 24 24" fill="#4A90D9"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </div>
    <div class="dock-icon" data-app="calculator" title="Calculator">
      <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--accent-color)"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 14h-2v-2h2v2zm0-4h-2v-2h2v2zm-4 4H9v-2h2v2zm0-4H9v-2h2v2zm-4 4H5v-2h2v2zm0-4H5v-2h2v2zm10-4H5V7h12v2z"/></svg>
    </div>
    <div class="dock-icon" data-app="weather" title="Weather">
      <svg viewBox="0 0 24 24" fill="#FF9800"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
    </div>
    <div class="dock-icon" data-app="calendar" title="Calendar">
      <svg viewBox="0 0 24 24" fill="#4285F4"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
    </div>
    <div class="dock-icon" data-app="monitor" title="System Monitor">
      <svg viewBox="0 0 24 24" fill="#4CAF50"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
    </div>
    <div class="dock-icon" data-app="games" title="Snake">
      <svg viewBox="0 0 24 24" fill="#388E3C"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
    </div>
    <div class="dock-icon" data-app="imageviewer" title="Image Viewer">
      <svg viewBox="0 0 24 24" fill="#00796B"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
    </div>
    <div class="dock-icon" data-app="pdf-viewer" title="PDF Viewer">
      <svg viewBox="0 0 24 24" fill="#D32F2F"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 9h-2v2H9v-2H7v-2h2V7h2v2h2v2zm3-3.5V9h-5V3.5L16 7.5z"/></svg>
    </div>
    <div class="dock-icon" data-app="photobooth" title="Photo Booth">
      <svg viewBox="0 0 24 24" fill="#7B1FA2"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
    </div>
    <div class="dock-separator"></div>
    <div class="dock-icon" id="dock-show-apps" title="Show Apps">
      <svg viewBox="0 0 24 24" fill="#ccc"><circle cx="5" cy="5" r="2.2"/><circle cx="12" cy="5" r="2.2"/><circle cx="19" cy="5" r="2.2"/><circle cx="5" cy="12" r="2.2"/><circle cx="12" cy="12" r="2.2"/><circle cx="19" cy="12" r="2.2"/><circle cx="5" cy="19" r="2.2"/><circle cx="12" cy="19" r="2.2"/><circle cx="19" cy="19" r="2.2"/></svg>
    </div>
  </div>

  <!-- Desktop Area -->
  <div id="desktop-area">

    <!-- Right-click context menu -->
    <div id="desktop-context-menu" class="context-menu hidden">
      <div class="context-item" data-action="new-terminal">Open Terminal</div>
      <div class="context-item" data-action="change-wallpaper">Change Background</div>
      <div class="context-separator"></div>
      <div class="context-item" data-action="display-profile">Display Settings</div>
    </div>

    <!-- Window HTML is loaded dynamically by js/window-loader.js -->


  </div>
</div>

<!-- Activities / App Grid Overlay -->
<div id="activities-overlay">
  <div id="activities-search-wrap">
    <input id="activities-search" type="text" placeholder="Type to search..." spellcheck="false" autocomplete="off">
  </div>
  <div id="activities-grid"></div>
  <div id="activities-page-dots">
    <div class="activities-dot active"></div>
  </div>
</div>

<script src="data/profile.js"></script>
<script>
// Shared z-index focus manager for all desktop windows
function bringWindowToFront(id) {
  var all = document.querySelectorAll('.desktop-window');
  for (var i = 0; i < all.length; i++) {
    all[i].style.zIndex = (all[i].id === id) ? 30 : 10;
  }
}
</script>
<script src="js/window-loader.js"></script>
</body>
</html>
